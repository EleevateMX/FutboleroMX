<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mi Perfil — TVContigo</title>
  <meta name="theme-color" content="#0ea5e9">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .p-wrap { max-width: 600px; margin: 0 auto; padding: 16px 16px 40px; }
    .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--text-dim); text-decoration:none; font-size:13px; margin-bottom:14px; }
    .p-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 16px; }
    .p-card h3 { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .p-card h3 .dot { width:7px; height:7px; border-radius:50%; background:var(--blue); }
    .avatar-big {
      width: 96px; height: 96px; border-radius: 50%; margin: 0 auto 14px;
      background: var(--blue); color:#fff; display:flex; align-items:center; justify-content:center;
      font-size:34px; font-weight:800; background-size:cover; background-position:center;
      border: 3px solid var(--border-hi); position: relative; cursor: pointer; overflow: hidden;
    }
    .avatar-overlay {
      position:absolute; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center;
      font-size:11px; opacity:0; transition:.2s;
    }
    .avatar-big:hover .avatar-overlay { opacity:1; }
    .bounty-row {
      display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:10px;
      background:var(--surface-2); border:1.5px solid var(--border); margin-bottom:7px;
    }
    .bounty-row.mine { border-color: var(--orange); background: rgba(249,115,22,.08); }
    .bounty-flag { font-size:22px; }
    .bounty-team { flex:1; }
    .bounty-team-name { font-size:13px; font-weight:700; }
    .bounty-team-sub { font-size:10px; color:var(--text-dim); }
    .bounty-payout { text-align:right; }
    .bounty-amt { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--green); line-height:1; }
    .bounty-amt-sub { font-size:9px; color:var(--text-muted); }
    .big-pot { text-align:center; padding:18px; background:linear-gradient(135deg,#0d1f3d,#1a1330); border-radius:14px; margin-bottom:16px; position:relative; overflow:hidden; }
    .big-pot::after { content:'🏆'; position:absolute; right:-6px; bottom:-14px; font-size:84px; opacity:.08; }
    .big-pot .val { font-family:'Bebas Neue',sans-serif; font-size:42px; color:var(--orange); line-height:1; }
    .big-pot .lbl { font-size:11px; color:var(--text-dim); letter-spacing:1px; }
  </style>
</head>
<body style="padding-top:0;">
<div class="p-wrap">
  <a class="back-link" href="index.html">← Volver a TVContigo</a>
  <div id="p-content">
    <div class="p-card" style="text-align:center;"><p style="color:var(--text-dim);">Cargando...</p></div>
  </div>
</div>

<input type="file" id="avatar-input" accept="image/*" style="display:none;">
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/perfil.js"></script>
</body>
</html>

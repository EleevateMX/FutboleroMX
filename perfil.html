<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mi Perfil — TVContigo</title>
  <meta name="theme-color" content="#0ea5e9">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .p-wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 48px; }
    .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--text-dim); text-decoration:none; font-size:13px; margin-bottom:14px; }
    .profile-title { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:1.5px; margin-bottom:14px; }
    /* Tabs */
    .profile-tabs { display:flex; gap:6px; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:16px; }
    .ptab { flex:1; background:none; border:none; color:var(--text-dim); font-family:inherit; font-size:13px; font-weight:700; padding:9px; border-radius:9px; cursor:pointer; transition:all .16s; }
    .ptab:hover { color:var(--text); }
    .ptab.active { background:var(--surface-3); color:#fff; }
    /* Cards */
    .profile-card { background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:18px; margin-bottom:14px; }
    .pc-h3 { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .pc-h3 .dot { width:7px; height:7px; border-radius:50%; background:var(--blue); }
    .pc-count { margin-left:auto; font-family:'Inter'; font-size:11px; font-weight:800; color:var(--text-dim); background:var(--surface-2); padding:3px 9px; border-radius:20px; }
    .pc-label { display:block; font-size:11px; font-weight:700; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
    .pc-help { font-size:11.5px; color:var(--text-muted); line-height:1.5; margin-top:7px; }
    /* User card */
    .pc-top { display:flex; align-items:center; gap:14px; }
    .pc-avatar { width:72px; height:72px; flex-shrink:0; border-radius:50%; background:var(--blue); color:#fff; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:800; background-size:cover; background-position:center; border:2.5px solid var(--border-hi); position:relative; cursor:pointer; overflow:hidden; }
    .pc-avatar-edit { position:absolute; right:-2px; bottom:-2px; width:24px; height:24px; border-radius:50%; background:var(--orange); color:#fff; font-size:12px; display:flex; align-items:center; justify-content:center; border:2px solid var(--surface); }
    .pc-meta { flex:1; min-width:0; }
    .pc-name { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:.5px; line-height:1.05; }
    .pc-email { font-size:12px; color:var(--text-dim); word-break:break-all; }
    .pc-handle { font-size:12px; color:var(--blue); font-weight:600; }
    .pc-fav { font-size:12.5px; margin-top:4px; }
    .pc-fav-none { color:var(--text-muted); }
    .pc-points { text-align:center; flex-shrink:0; }
    .pc-points-val { font-family:'Bebas Neue',sans-serif; font-size:40px; color:var(--accent,#facc15); line-height:1; }
    .pc-points-lbl { font-size:9px; font-weight:800; letter-spacing:1px; color:var(--text-muted); }
    .pc-level { margin-top:16px; border-top:1px solid var(--border); padding-top:14px; }
    .pc-level-top { display:flex; justify-content:space-between; font-size:12.5px; color:var(--text-dim); margin-bottom:7px; }
    .pc-level-top strong { color:var(--text); }
    .pc-bar { height:8px; background:var(--surface-3); border-radius:20px; overflow:hidden; }
    .pc-bar-fill { height:100%; background:linear-gradient(90deg,var(--orange),#fbbf24); border-radius:20px; transition:width .5s; }
    .pc-level-next { font-size:11px; color:var(--text-muted); margin-top:7px; }
    .pc-level-next strong { color:var(--orange); }
    .pc-guest { margin-top:14px; background:rgba(249,115,22,.08); border:1px solid rgba(249,115,22,.25); border-radius:10px; padding:11px 13px; font-size:12px; color:var(--text-dim); }
    .pc-guest a { color:var(--orange); font-weight:700; display:block; margin-top:4px; text-decoration:none; }
    /* Avatar grid */
    .avatar-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
    .avatar-option { aspect-ratio:1; background:var(--surface-2); border:1.5px solid var(--border); border-radius:12px; font-size:24px; cursor:pointer; transition:all .14s; }
    .avatar-option:hover { border-color:var(--border-hi); transform:scale(1.05); }
    .avatar-option.sel { border-color:var(--green); background:rgba(34,197,94,.12); box-shadow:0 0 0 1px var(--green); }
    .pc-upload { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:12px; padding:11px 13px; border:1px dashed var(--border-hi); border-radius:12px; font-size:12px; color:var(--text-dim); }
    /* Team grid */
    .team-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:8px; max-height:300px; overflow-y:auto; padding-right:4px; }
    .team-option { background:var(--surface-2); border:1.5px solid var(--border); border-radius:10px; padding:10px 6px; cursor:pointer; text-align:center; font-size:11px; font-weight:600; color:var(--text-dim); transition:all .14s; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .team-option:hover { border-color:var(--border-hi); color:var(--text); }
    .team-option.sel { border-color:var(--orange); background:rgba(249,115,22,.14); color:var(--orange); }
    .team-option .t-f { font-size:22px; }
    /* Featured picks */
    .fp-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; color:var(--text-dim); }
    .fp-row:last-of-type { border-bottom:none; }
    .fp-row strong { color:var(--text); text-align:right; }
    .fp-actions { display:flex; gap:8px; margin-top:12px; }
    .fp-actions .btn { flex:1; text-align:center; text-decoration:none; }
    /* Badges */
    .badges-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .badge-card { background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:12px 8px; text-align:center; opacity:.5; filter:grayscale(.8); }
    .badge-card.on { opacity:1; filter:none; border-color:rgba(250,204,21,.4); background:rgba(250,204,21,.06); }
    .badge-ic { font-size:26px; line-height:1; }
    .badge-name { font-size:11px; font-weight:800; margin-top:6px; }
    .badge-desc { font-size:9.5px; color:var(--text-muted); line-height:1.3; margin-top:3px; }
    /* Language */
    .lang-switch { display:flex; gap:6px; background:var(--surface-2); border:1px solid var(--border); border-radius:11px; padding:4px; }
    .lang-opt { flex:1; background:none; border:none; color:var(--text-dim); font-family:inherit; font-size:13px; font-weight:700; padding:9px; border-radius:8px; cursor:pointer; }
    .lang-opt.active { background:var(--surface-3); color:#fff; }
    /* Mis pronósticos */
    .mp-list { display:flex; flex-direction:column; gap:10px; }
    .mp-card { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:14px; }
    .mp-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
    .mp-match { font-size:13px; font-weight:700; }
    .mp-match b { color:var(--text-muted); font-weight:600; }
    .mp-badge { font-size:9px; font-weight:800; padding:2px 8px; border-radius:20px; letter-spacing:.5px; }
    .mp-badge.sb-upcoming { color:var(--blue); background:rgba(14,165,233,.14); }
    .mp-badge.sb-live { color:var(--red); background:rgba(239,68,68,.14); }
    .mp-badge.sb-final { color:var(--text-dim); background:rgba(255,255,255,.06); }
    .mp-mid { display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:6px; }
    .mp-pick strong, .mp-info strong { color:var(--text); }
    .mp-info { font-size:12px; color:var(--text-dim); margin-bottom:10px; }
    .mp-pts { color:var(--green); font-weight:800; }
    .mp-action .btn { text-decoration:none; }
    /* Actividad */
    .act-row { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
    .act-row:last-child { border-bottom:none; }
    .act-dot { width:7px; height:7px; border-radius:50%; background:var(--blue); margin-top:5px; flex-shrink:0; }
    .act-label { font-size:13px; }
    .act-time { font-size:11px; color:var(--text-muted); margin-top:2px; }
    /* Empty */
    .pc-empty { text-align:center; padding:34px 18px; }
    .pc-empty-ic { font-size:34px; }
    .pc-empty p { color:var(--text-dim); font-size:13px; margin:10px 0 14px; }
    .pc-empty .btn { text-decoration:none; }
    /* Footer */
    .profile-foot { text-align:center; font-size:11px; color:var(--text-muted); margin-top:18px; line-height:2; }
    .profile-foot a { color:var(--text-muted); }
    .profile-disc { margin-top:4px; }
    /* Cómo se juega modal */
    .howto-overlay { position:fixed; inset:0; z-index:600; background:rgba(0,0,0,.72); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:16px; }
    .howto-box { background:var(--surface); border:1px solid var(--border-hi); border-radius:18px; padding:24px; max-width:400px; width:100%; position:relative; box-shadow:0 24px 64px rgba(0,0,0,.8); }
    .howto-x { position:absolute; top:14px; right:16px; background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; }
    .howto-box h2 { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:1px; margin-bottom:16px; }
    .howto-box h2 span { color:var(--orange); }
    .howto-box ol { padding-left:20px; margin-bottom:18px; display:flex; flex-direction:column; gap:9px; }
    .howto-box li { font-size:13px; color:var(--text-dim); line-height:1.5; }
  </style>
</head>
<body style="padding-top:0;">
<div class="p-wrap">
  <a class="back-link" href="index.html">← Volver a TVContigo</a>
  <div id="p-content">
    <div class="p-card" style="text-align:center;"><p style="color:var(--text-dim);">Cargando...</p></div>
  </div>
</div>

<input type="file" id="avatar-input" accept="image/*" style="display:none;">
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/perfil.js"></script>
</body>
</html>

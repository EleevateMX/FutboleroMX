<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#07070f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity=".04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <ellipse cx="256" cy="200" rx="240" ry="160" fill="url(#glow)"/>

  <!-- TV body -->
  <rect x="64" y="120" width="384" height="244" rx="20" fill="#0f1a2e" stroke="#0ea5e9" stroke-width="3" stroke-opacity=".5"/>
  <!-- TV screen -->
  <rect x="84" y="140" width="344" height="200" rx="10" fill="url(#screen)"/>
  <!-- Screen glow lines -->
  <line x1="84" y1="180" x2="428" y2="180" stroke="#0ea5e9" stroke-width=".8" stroke-opacity=".12"/>
  <line x1="84" y1="220" x2="428" y2="220" stroke="#0ea5e9" stroke-width=".8" stroke-opacity=".12"/>
  <line x1="84" y1="260" x2="428" y2="260" stroke="#0ea5e9" stroke-width=".8" stroke-opacity=".12"/>
  <line x1="84" y1="300" x2="428" y2="300" stroke="#0ea5e9" stroke-width=".8" stroke-opacity=".12"/>

  <!-- Play button (football) -->
  <circle cx="256" cy="230" r="52" fill="#0ea5e9" fill-opacity=".12" stroke="#0ea5e9" stroke-width="2" stroke-opacity=".5"/>
  <polygon points="238,206 283,230 238,254" fill="#0ea5e9" fill-opacity=".9"/>

  <!-- TV stand -->
  <rect x="216" y="364" width="80" height="12" rx="4" fill="#0f1a2e" stroke="#0ea5e9" stroke-width="2" stroke-opacity=".3"/>
  <rect x="176" y="374" width="160" height="10" rx="5" fill="#0ea5e9" fill-opacity=".25"/>

  <!-- Signal dots top right -->
  <circle cx="400" cy="148" r="4" fill="#0ea5e9" opacity=".7"/>
  <circle cx="416" cy="148" r="4" fill="#0ea5e9" opacity=".4"/>
  <circle cx="432" cy="148" r="4" fill="#f97316" opacity=".9"/>

  <!-- TVCONTIGO text -->
  <text x="256" y="452" font-family="Arial Black,Impact,sans-serif" font-size="42"
        font-weight="900" fill="#f0f0ff" text-anchor="middle" letter-spacing="-1">TVCONTIGO</text>
  <text x="256" y="488" font-family="Arial Black,Impact,sans-serif" font-size="20"
        font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="6">SITE</text>
</svg>

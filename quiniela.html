<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Quiniela Mundialista — TVContigo</title>
  <meta name="description" content="Participa en la Quiniela Mundialista 2026. Predice al campeón y reparte el bote entre los ganadores.">
  <meta name="theme-color" content="#0ea5e9">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .q-wrap { max-width: 680px; margin: 0 auto; padding: 16px 16px 48px; }
    .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--text-dim); text-decoration:none; font-size:13px; margin-bottom:14px; }
    .q-hero {
      background: linear-gradient(135deg, #0d1f3d, #0f1f3d 40%, #1a1330);
      border: 1.5px solid rgba(249,115,22,.3); border-radius: 18px;
      padding: 22px; text-align: center; margin-bottom: 18px; position: relative; overflow: hidden;
    }
    .q-hero::after { content: '🏆'; position: absolute; right: -10px; bottom: -20px; font-size: 120px; opacity: .06; }
    .q-hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; }
    .q-hero h1 span { color: var(--orange); }
    .q-hero p { color: var(--text-dim); font-size: 13px; margin-top: 6px; }
    .q-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 14px; }
    .q-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .q-card h3 .num { width: 22px; height: 22px; border-radius: 50%; background: var(--orange); color: #fff; font-family: 'Inter'; font-size: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; }
    /* Pool selector cards */
    .pool-card { background: linear-gradient(135deg,#101a2e,#161228); border:1.5px solid var(--border); border-radius:14px; padding:18px; margin-bottom:12px; cursor:pointer; transition:all .18s; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .pool-card:hover { border-color:var(--orange); transform:translateY(-2px); }
    .pool-name { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; }
    .pool-sub { font-size:12px; color:var(--text-dim); }
    .pool-pot { text-align:right; }
    .pool-pot-val { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--orange); line-height:1; }
    .pool-pot-lbl { font-size:9px; color:var(--text-muted); letter-spacing:.5px; }
    .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px,1fr)); gap: 8px; }
    .team-opt { background: var(--surface-2); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 6px; cursor: pointer; text-align: center; transition: all .15s; font-size: 11px; }
    .team-opt:hover { border-color: var(--orange); }
    .team-opt.sel { background: rgba(249,115,22,.15); border-color: var(--orange); color: var(--orange); font-weight: 700; }
    .team-opt .f { font-size: 22px; display: block; }
    .legal-strip { font-size: 11px; color: var(--text-muted); text-align: center; line-height: 1.7; margin-top: 16px; }
    .legal-strip a { color: var(--text-dim); }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .status-pending { background: rgba(249,115,22,.15); color: var(--orange); }
    .status-verified { background: rgba(34,197,94,.15); color: var(--green); }
    .status-rejected { background: rgba(239,68,68,.15); color: var(--red); }
    .confirm-box { background: rgba(34,197,94,.08); border:1px solid rgba(34,197,94,.3); border-radius:12px; padding:16px; text-align:center; }
    .bounty-row { display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:10px; background:var(--surface-2); border:1.5px solid var(--border); margin-bottom:6px; }
    .bounty-row.mine { border-color: var(--orange); background: rgba(249,115,22,.08); }
    .bounty-amt { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--green); }
  </style>
</head>
<body style="padding-top:0;padding-bottom:24px;">
<div class="q-wrap">
  <a class="back-link" href="index.html">← Volver a TVContigo</a>
  <div class="q-hero">
    <h1>QUINIELA <span>MUNDIALISTA</span></h1>
    <p>Predice al campeón del Mundial 2026 · El bote se reparte entre los ganadores</p>
  </div>
  <div id="q-app">
    <div class="q-card" style="text-align:center;"><p style="color:var(--text-dim);">Cargando quinielas...</p></div>
  </div>
  <div class="legal-strip">
    Al participar aceptas el <a href="pages/reglamento-quiniela.html">Reglamento</a>,
    los <a href="pages/terminos.html">Términos</a> y el <a href="pages/privacidad.html">Aviso de Privacidad</a>.
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/quiniela.js"></script>
</body>
</html>
